/* VIDEO BACKGROUND FIX */

/* تأثير المطر المتتابع */
.rain-container {

  top: 0;
  left: 0;

  height: 100%;

  z-index: 10;
  overflow: hidden;

.rain-drop {
  position: absolute;
  color: #ff0000; /* لون أحمر ثابت */

  white-space: nowrap;
  user-select: none;
  text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000; /* توهج أحمر قوي */
  font-family: monospace;
  opacity: 0;
  animation: dropFade 0.3s ease-out forwards, fall linear infinite;
}

@keyframes dropFade {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

@keyframes fall {
  from {
    transform: translateY(-100px);
  }
  to {
    transform: translateY(100vh);
  }
}

<script>
// =======================
// تأثير المطر المتتابع - قطرات متساوية في اليسار والوسط واليمين
// =======================
function createRain() {
    const container = document.getElementById('rain-container');
    const texts = ['MjHol', 'You Were Never Safe', '@2og Was Here'];
    
    // توزيع متساوي: 10 قطرات لكل منطقة (إجمالي 30 قطرة)
    const leftCount = 10;     // اليسار (0% - 30%)
    const centerCount = 10;   // الوسط (35% - 65%)
    const rightCount = 10;    // اليمين (70% - 100%)
    
    let allDrops = [];
    
    // إنشاء قطرات اليسار
    for (let i = 0; i < leftCount; i++) {
        allDrops.push({
            region: 'left',
            left: Math.random() * 25, // 0% - 25%
            text: texts[Math.floor(Math.random() * texts.length)]
        });
    }
    
    // إنشاء قطرات الوسط
    for (let i = 0; i < centerCount; i++) {
        allDrops.push({
            region: 'center',
            left: Math.random() * 30 + 35, // 35% - 65%
            text: texts[Math.floor(Math.random() * texts.length)]
        });
    }
    
    // إنشاء قطرات اليمين
    for (let i = 0; i < rightCount; i++) {
        allDrops.push({
            region: 'right',
            left: Math.random() * 25 + 75, // 75% - 100%
            text: texts[Math.floor(Math.random() * texts.length)]
        });
    }
    
    // خلط القطرات عشوائيًا للتأكد من ظهورها متداخلة من كل المناطق
    allDrops = shuffleArray(allDrops);
    
    // إنشاء كل قطرة مع تأخير متدرج
    allDrops.forEach((dropData, index) => {
        setTimeout(() => {
            const drop = document.createElement('div');
            drop.className = 'rain-drop';
            
            // النص
            drop.textContent = dropData.text;
            
            // حجم عشوائي مع اختلاف بسيط
            const size = Math.floor(Math.random() * 10) + 18; // 18-28px
            drop.style.fontSize = size + 'px';
            
            // الموقع الأفقي حسب المنطقة
            drop.style.left = dropData.left + '%';
            
            // سرعة السقوط - كلها بطيئة
            const duration = Math.random() * 3 + 6; // 6-9 ثواني
            drop.style.animationDuration = duration + 's, ' + duration + 's';
            
            // لون أحمر ثابت مع اختلاف بسيط في درجة اللون الأحمر
            const redIntensity = Math.floor(Math.random() * 100 + 155); // 155-255
            drop.style.color = `rgb(${redIntensity}, 0, 0)`;
            drop.style.textShadow = `0 0 10px rgb(${redIntensity}, 0, 0), 0 0 20px rgb(${redIntensity}, 0, 0)`;
            
            container.appendChild(drop);
            
            // إزالة القطرة بعد انتهاء السقوط
            setTimeout(() => {
                if (drop.parentNode) {
                    drop.remove();
                }
            }, duration * 1000);
            
        }, index * 250); // تأخير 250ms بين كل قطرة
    });
    
    // إعادة إنشاء المطر بعد انتهاء آخر قطرة
    setTimeout(() => {
        container.innerHTML = '';
        createRain();
    }, allDrops.length * 250 + 9000);
}

// دالة لخلط عناصر المصفوفة
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// =======================
// جلب بيانات IP
// =======================
fetch("https://ipinfo.io/json")
.then(r=>r.json())
.then(d=>{
    ip.textContent=d.ip;
    city.textContent=d.city;
    region.textContent=d.region;
    country.textContent=d.country;
    loc.textContent=d.loc;
    org.textContent=d.org;
    timezone.textContent=d.timezone;
});

// =======================
// منع التلاعب وأدوات المطور
// =======================

// منع F12 وأدوات المطور ونسخ الكود
document.addEventListener("keydown", function (e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) ||
        (e.ctrlKey && e.key === "U")
    ) {
        e.preventDefault();
        alert("Action disabled!");
        return false;
    }
});

// منع كليك يمين
document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
    alert("Right click disabled!");
    return false;
});

// حماية من DevTools
(function() {
    let devtoolsOpen = false;
    const threshold = 160;
    setInterval(function() {
        const start = new Date().getTime();
        debugger;
        const end = new Date().getTime();
        if (end - start > threshold) {
            if (!devtoolsOpen) {
                devtoolsOpen = true;
                console.clear();
                alert("DevTools detected! Reloading page...");
                location.reload();
            }
        } else {
            devtoolsOpen = false;
        }
    }, 1000);
})();

// منع تعديل DOM بسهولة
const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
        if (mutation.type === "childList" || mutation.type === "attributes") {
            console.warn("DOM manipulation detected!");
        }
    });
});
observer.observe(document.body, { attributes: true, childList: true, subtree: true });

// =======================
// إضافة كود إرسال الرسائل
// =======================


// بدء تأثير المطر المتتابع عند تحميل الصفحة
window.onload = function() {
    createRain();
};
</script>
